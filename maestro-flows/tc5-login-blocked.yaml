---
# TC5: Login is blocked for unverified email
appId: com.expensemanager.dev
name: TC5 - Login Blocked for Unverified Email

commands:
  - launchApp

  # Generate unique test email
  - setVariable:
      testEmail: "e2e-blocked-${timestamp}@example.com"
      testPassword: "TestPass123!"

  # Create unverified user
  - runFlow: SignupFlow
    params:
      email: ${testEmail}
      password: ${testPassword}
      name: "Test User"

  # Go back to login screen
  - back

  # Run login flow
  - runFlow: LoginFlow
    params:
      email: ${testEmail}
      password: ${testPassword}

  - waitForAnimationToEnd

  # Verify: Login is blocked with email verification error
  - assertVisible:
      text: "verify your email"
      isRegex: true
      timeout: 5000
      description: "Login should be blocked for unverified email"

  # DATABASE: Confirm user still unverified
  - runFlow: VerifyEmailState
    params:
      email: ${testEmail}
      expectedEmailVerified: false
      expectedTokenIsUsed: false
