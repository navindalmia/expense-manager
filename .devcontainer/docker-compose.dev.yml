version: '3.8'

services:
  app:
    image: node:22-bullseye
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    working_dir: /workspace/expense-manager
    env_file:
      - ./backend/.env
      - ./backend/.env.local
    environment:
      - NODE_ENV=development
      # Override hostname only — credentials come from .env files above
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/expense_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
